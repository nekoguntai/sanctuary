# Prometheus Configuration
#
# Scrapes metrics from the Sanctuary backend and Node Exporter.
# Integrates with existing Grafana for visualization.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sanctuary'

# Alerting (optional)
# To enable alert notifications, deploy Alertmanager and uncomment:
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']
# See: https://prometheus.io/docs/alerting/latest/alertmanager/

# Rule files - alert rules for Sanctuary
rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Sanctuary Backend API
  - job_name: 'sanctuary-backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Sanctuary Worker (Background Jobs, Electrum Subscriptions)
  - job_name: 'sanctuary-worker'
    static_configs:
      - targets: ['worker:3002']
    metrics_path: /metrics/prometheus
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL (if pg_exporter is added later)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis (if redis_exporter is added later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
